name: Validate Governance Artifacts

# Source Attribution: governance__github_docs.md, documentation__diataxis.md, ai_ops__openai_docs.md; GitHub Docs + Diataxis + OpenAI docs; native-platform-binding; Reviewed on 2026-03-27

on:
  push:
    paths:
      - 'artifacts/**'
      - '.github/**'
      - 'scripts/**'
      - 'README.md'
      - 'GOVERNANCE.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SUPPORT.md'
      - 'SECURITY.md'
      - 'decision_log.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'LICENSE'
      - 'sources/**'
  pull_request:
    paths:
      - 'artifacts/**'
      - '.github/**'
      - 'scripts/**'
      - 'README.md'
      - 'GOVERNANCE.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SUPPORT.md'
      - 'SECURITY.md'
      - 'decision_log.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - 'LICENSE'
      - 'sources/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate governance artifacts
        run: python3 scripts/validate_governance_artifacts.py
