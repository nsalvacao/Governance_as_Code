name: Generate Governance Manifest

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - 'scripts/generate_manifest.py'

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate Manifest
        run: python3 scripts/generate_manifest.py
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- docs/manifest.json; then
            git add docs/manifest.json
            git commit -m "chore(docs): auto-generate manifest.json from README"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi

