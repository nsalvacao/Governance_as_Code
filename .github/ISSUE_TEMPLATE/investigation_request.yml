name: Investigation request
description: Ask for clarification on structure, applicability, or validation behavior.
title: "[Investigation] "
labels:
  - question
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Repository structure
        - Reusable artifact
        - Validation
        - Governance decision
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: State the ambiguity or inconsistency you want clarified.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Related paths
      description: Link the relevant files or directories if known.
    validations:
      required: false

