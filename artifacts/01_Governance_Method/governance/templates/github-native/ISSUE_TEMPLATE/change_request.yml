name: Governance change request
description: Propose a new governance artifact, modification, or automation enhancement.
title: "[Change] {{SHORT_TITLE}}"
labels:
  - enhancement
assignees:
- "{{GOVERNANCE_TEAM}}"
body:
- type: markdown
  attributes:
    value: |
      ## Change rationale
      Summarise the problem you are solving and how the change aligns with the selective instantiation rule.
- type: textarea
  id: scope
  attributes:
    label: Scope
    description: Which families (conventions, automation, policies) will this affect?
- type: dropdown
  id: automation
  attributes:
    label: Automation impact
    options:
    - Not applicable
    - Requires workflow changes
    - Requires issue form updates
- type: textarea
  id: placeholders
  attributes:
    label: Placeholder updates
    description: List any new `{{PLACEHOLDER}}` values that downstream repos must configure.

