name: Governance bug report
description: Report a bug in this governance corpus or the automation that enforces it.
title: "[Bug] {{SHORT_TITLE}}"
labels:
  - bug
assignees:
- "{{GOVERNANCE_TEAM}}"
body:
- type: markdown
  attributes:
    value: |
      ## Bug summary
      Describe the unexpected behaviour, the affected automation or document, and why downstream repositories were impacted.
- type: dropdown
  id: severity
  attributes:
    label: Severity
    description: Choose the severity of the bug.
    options:
    - Critical
    - High
    - Medium
    - Low
- type: textarea
  id: impact
  attributes:
    label: Impact
    description: What repositories or automation paths does this affect?
- type: textarea
  id: steps
  attributes:
    label: Steps to reproduce
    description: Provide the deterministic steps or automation inputs needed to see the issue.

