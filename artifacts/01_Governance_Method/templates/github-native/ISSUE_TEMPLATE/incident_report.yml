name: Incident report
description: Record an incident, security event, or automation failure that affected governance assets.
title: "[Incident] {{SHORT_TITLE}}"
labels:
  - bug
assignees:
- "{{GOVERNANCE_TEAM}}"
body:
- type: dropdown
  id: severity
  attributes:
    label: Severity
    options:
    - Sev1
    - Sev2
    - Sev3
- type: textarea
  id: summary
  attributes:
    label: Incident summary
    description: Explain what happened and why it matters.
- type: textarea
  id: timeline
  attributes:
    label: Timeline
    description: Provide the chronological steps taken (detection → triage → resolution).
- type: textarea
  id: mitigation
  attributes:
    label: Mitigation
    description: What automation inputs or documents changed? Mention `{{AUTOMATION_WORKFLOW}}` if relevant.

