name: Investigation request
description: Ask for governance-level investigation, research, or clarification before filing a change.
title: "[Investigation] {{SHORT_TITLE}}"
labels:
  - question
assignees:
- "{{GOVERNANCE_TEAM}}"
body:
- type: markdown
  attributes:
    value: |
      ## Investigation need
      Outline the question, uncertainty, or evidence gap that prompted this request.
- type: textarea
  id: downstream
  attributes:
    label: Downstream impact
    description: Which repositories might benefit once the investigation concludes?
- type: textarea
  id: timeline
  attributes:
    label: Time sensitivity
    description: When do you need a decision or clarification?

